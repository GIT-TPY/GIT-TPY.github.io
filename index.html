<!DOCTYPE html>
<html>
    <head lang="zh-cn">
        <meta charset="utf-8">
        <link rel="icon" href="" type="image/x-icon"> <!-- 为网页加入icon图标 -->
        <style>
            body {
                z-index: 2;
                width: 100%; height: 834px;
                min-height: 834px; /*设置高度最低限度，注意它只是设置最低限度，height也需要设置*/
                margin: 0px;
            }
            .top {
                /*大小属性*/
                width: 100%; height: 100px;
                /*背景属性*/
                background-image: url("./img/headbg.png");
                background-size: 100%;
                background-position: center;
            }
            .center {
                /*大小属性*/
                width: 100%; height: 100%;
                margin-top: 30px;
            }
            .sideBarDetector {
                /*位置属性*/
                float: left;
                /*大小属性*/
                width: 3%; height: 100%;
                border-radius: 0% 10px 10px 0%;
                /*背景属性*/
                background-color: azure;
            }
            .main {
                /*位置属性*/
                float: left;
                /*大小属性*/
                width: 95%; height: 100%;
                margin-left: 2%;
                border-radius: 10px 0% 0% 10px;
                /*背景属性*/
                background-image: url("./img/contentbg.png");
                background-size: 100%;
                background-repeat: no-repeat;
                background-position: center;
            }
            .content-box {
                /*位置属性*/
                position: relative;
                /*大小属性*/
                width: 80%; height: 97%;
                margin-top: 1%; margin-bottom: 1%; margin-left: 8%; margin-right: 5%;
                border-radius: 15px;
                /*背景属性*/
                background-color: bisque;
                opacity: 0.925; /*设置透明度*/
            }
            .content {
                /*大小属性*/
                width: 96%; height: 96%;
                padding: 2%;
            }
            .content hr {
                /*大小属性*/
                width: 100%; height: 0.125px;
                /*背景属性*/
                border-width: 0.125px;
                border-color: black;
                background-color: black;
            }
            .content-title {
                /*位置属性*/
                display: flex;
                /*大小属性*/
                width: 100%; height: 6%;
            }
            .content-title-icon {
                /*位置属性*/
                display: flex;
                float: left;
                /*大小属性*/
                width: 4%; height: 100%;
                margin-right: 1%;
            }
            .content-title-name {
                /*位置属性*/
                display: flex;
                float: left;
                /*大小属性*/
                width: 95%; height: 100%;
                /*文字属性*/
                font-family: sans-serif;
            }
            .content-title-name span {
                /*位置属性*/
                display: block;
                justify-content: center;
                /*大小属性*/
                height: 100%;
                /*文字属性*/
                font-size: 30px;
                font-weight: 550; /*加粗字体*/
            }
            .sideBar {
                /*位置属性*/
                position: fixed; top: 0%; left: 0%; /*使用fixed让边栏永远适应屏幕大小*/
                /*大小属性*/
                width: 15%; height: 100%;
                /*文字属性*/
                white-space: nowrap; /*折叠时字体不换行*/
                /*背景属性*/
                background-color: black;
                /*其他属性*/
                list-style: none;
                overflow-x: hidden; /*隐藏溢出部分*/
                transition: 0.5s;
            }
            .sideBar ul {
                /*大小属性*/
                width: 100%; height: 10%;
                margin: 0px; padding: 0px;
            }
            .sideBar li {
                /*大小属性*/
                width: 100%; height: 100%;
            }
            .sideBar a {
                /*位置属性*/
                display: flex;
                align-items: center;
                justify-content: center;
                /*大小属性*/
                width: 99%; height: 100%;
                /*文字属性*/
                font-size: 25px;
                font-weight: 800;
                text-align: center;
                color: rgb(180, 180, 180);
                text-decoration: none; /*去除链接下划线*/
                /*背景属性*/
                border-left: solid 2px black;
                /*其他属性*/
                transition: 0.5s; /*高亮动画*/
            }
            .sideBar a:hover {
                /*背景属性*/
                border-left: solid 2px white;
                /*文字属性*/
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="top">1</div>
        <div class="center">
            <div class="sideBarDetector" onmouseover="openSideBar()">2.1</div>
            <div class="main">
                <label style="position: absolute; top: 15%; left: 5%;">2.2</label>
                <div class="content-box">
                    <label style="position: absolute; top: 0%; left: 0%;">2.2.1</label>
                    <div class="content">
                        <div class="content-title">
                            <div class="content-title-icon">
                                <svg t="1672559465273" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2672" width="40" height="40"><path d="M1012.646039 459.30735 535.153 8.876259c-10.824779-11.426156-28.264701-12.027532-39.690857-0.601377L12.556714 458.104597c-7.216519 6.013766-12.027532 16.237169-12.027532 27.663325 0 19.244052 13.831662 34.278468 30.670208 34.278468l108.849169 0 0 354.812208c0 40.89361 15.034416 78.178961 39.089481 105.240909 24.055065 27.061948 57.130779 43.900494 93.814753 43.900494l117.268442 0 0-144.33039 0-272.423611c0-10.824779 4.209636-21.048182 10.223403-28.264701 6.615143-7.216519 15.635792-12.027532 25.257818-12.027532l174.399221 0c9.622026 0 18.642675 4.811013 25.257818 12.027532 6.615143 7.216519 10.223403 17.439922 10.223403 28.264701l0 416.754 159.966182 0 3.60826 0 4.209636 0c22.250935 0 42.69774-10.223403 57.732156-27.061948 15.034416-16.838545 24.055065-39.690857 24.055065-64.948675L885.154195 520.046389 992.800611 520.046389l0 0c9.020649 0 17.439922-4.209636 23.453688-12.027532C1027.079078 492.984441 1025.274949 471.334883 1012.646039 459.30735zM178.536662 452.692207l1.202753 0 0 0.601377C179.739415 453.293584 179.138039 453.293584 178.536662 452.692207z" p-id="2673"></path></svg>
                            </div>
                            <div class="content-title-name">
                                <span>主页</span>
                                <p>👋Hi, 欢迎来到这里</p>
                            </div>
                        </div>
                        <hr />
                    </div>
                </div>
            </div>
        </div>
        <div id="sideBar" class="sideBar" onmouseleave="closeSideBar()">
            <ul>
                <li><a href="#">主页</a></li>
                <li><a href="#">影视</a></li>
                <li><a href="#">游戏</a></li>
            </ul>
        </div>
    </body>
    <script lang="javascript">
        function openSideBar(){
            document.getElementById("sideBar").style.width = "15%";
            document.getElementById("sideBar").style.boxShadow = "0px 1px 10px 5px #c4c9ce"; //boxShadow用于添加边框阴影
        }
        function closeSideBar(){
            document.getElementById("sideBar").style.width = "0%";
            document.getElementById("sideBar").style.boxShadow = "0px 0px 0px 0px #c4c9ce";
        }
    </script>
</html>
